server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # Cực kỳ quan trọng đối với Single Page Application (SPA) như React:
        # Nếu đường dẫn không khớp với file tĩnh có sẵn, Nginx sẽ trả về index.html 
        # để React Router xử lý định tuyến phía client-side.
        try_files $uri $uri/ /index.html;
    }

    # Bật Gzip nén dữ liệu giúp tải trang cực nhanh trên production
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;
    gzip_disable "MSIE [1-6]\.";

    # Xử lý trang lỗi hệ thống
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
